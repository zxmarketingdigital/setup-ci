name: "ZX Control Setup CI"
description: "Valida um repo de Setup ZX Control contra as 12 regras invioláveis (AST Python 3.9 + greps mecânicos + estrutura mínima)."
branding:
  icon: "check-circle"
  color: "orange"

runs:
  using: "composite"
  steps:
    - name: Checkout do código submetido
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # histórico completo p/ checar .env nunca commitado

    - name: Setup Python 3.9 (mesma versão do aluno)
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Rodar validador das 12 regras
      shell: bash
      run: |
        python3 "${GITHUB_ACTION_PATH}/validate.py" --path "${GITHUB_WORKSPACE}"
